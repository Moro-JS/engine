name: sanitizers

# ASan + UBSan over the standalone C++ unit tests. Fast enough for every push
# and PR. A sanitizer finding is a release blocker (CONTRIBUTING.md).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  asan-ubsan:
    runs-on: ubuntu-latest
    env:
      # Belt-and-suspenders with -fno-sanitize-recover=all: abort with a trace
      # on the first sanitizer error.
      ASAN_OPTIONS: abort_on_error=1:halt_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: sudo apt-get update && sudo apt-get install -y clang

      # test/run-unit.sh hardcodes -O2 with no CXXFLAGS/sanitizer hook, so
      # compile the two pure-C++ unit tests directly with the sanitizers.
      # -fno-sanitize-recover=all makes any finding a non-zero exit.
      - name: HTTP parser unit tests (ASan/UBSan)
        run: |
          clang++ -std=c++20 -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            test/http-parser-unit.cpp -o /tmp/moro_hp_asan
          /tmp/moro_hp_asan

      - name: WebSocket unit tests (ASan/UBSan)
        run: |
          clang++ -std=c++20 -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            test/websocket-unit.cpp -o /tmp/moro_ws_asan
          /tmp/moro_ws_asan

      - name: permessage-deflate unit tests (ASan/UBSan)
        run: |
          sudo apt-get update && sudo apt-get install -y zlib1g-dev
          clang++ -std=c++20 -O1 -g -fsanitize=address,undefined -fno-sanitize-recover=all \
            test/ws-deflate-unit.cpp -lz -o /tmp/moro_pmd_asan
          /tmp/moro_pmd_asan

  # The unit tests above cover the pure parsers; this job covers what they
  # can't: server.h's connection/timeout/framing state machine and binding.cpp,
  # which own buffers across async lifetimes (the use-after-free territory).
  # The addon is built with ASan/UBSan and the full conformance + hardening +
  # WS suites run against it under a preloaded sanitizer runtime.
  asan-addon:
    runs-on: ubuntu-latest
    env:
      # detect_leaks=0: Node itself reports benign leaks at exit that would
      # drown real findings; ASan's memory-error detection is unaffected.
      ASAN_OPTIONS: abort_on_error=1:halt_on_error=1:detect_leaks=0
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build addon with ASan/UBSan
        run: node tools/build.mjs --sanitize
      - name: Conformance suites against the sanitized addon
        run: |
          export LD_PRELOAD="$(g++ -print-file-name=libasan.so) $(g++ -print-file-name=libubsan.so)"
          node --test test/conformance.test.mjs
          node --test test/conformance-edge.test.mjs
          node --test test/conformance-hardening.test.mjs
          node --test test/ws-conformance.test.mjs
          node --test test/limits-conformance.test.mjs
          node --test test/tls-conformance.test.mjs
          node --test test/tls-hardening.test.mjs
          node --test test/ws-deflate-conformance.test.mjs
