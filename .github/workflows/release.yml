name: release

# Publish @morojs/engine when a GitHub Release is PUBLISHED (the human step:
# tools/release.mjs pushes the vX.Y.Z tag, then someone drafts the Release for
# that tag with the release notes and clicks Publish — that click is the launch
# button). Binaries ship ONLY from this CI run with npm provenance — never from
# a developer machine (CONTRIBUTING.md).
#
# Flow: rebuild every platform (same matrix as ci.yml) -> collect the .node
# artifacts -> assemble the per-platform packages + sync all versions
# (tools/prepare-release.mjs) -> publish each platform package, then the meta
# package LAST so its optionalDependencies already resolve. Publishes are
# idempotent (already-on-registry versions are skipped), so re-running is safe.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  darwin:
    # Node 25/26's V8 headers use braced-init template args (P2308) that need
    # clang 18+; the runner's Apple clang is older, so build with Homebrew LLVM.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Use Homebrew LLVM (clang 18+ for Node 25/26 V8 headers)
        run: |
          brew list llvm >/dev/null 2>&1 || brew install llvm
          echo "CXX=$(brew --prefix llvm)/bin/clang++" >> "$GITHUB_ENV"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node tools/build.mjs --all --arch arm64
      - run: node tools/build.mjs --all --arch x64
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-darwin
          path: build/*.node

  linux-gnu:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
          - runner: ubuntu-22.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node tools/build.mjs --all
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}-gnu
          path: build/*.node

  # docker-run instead of `container:`: JS actions can't run inside Alpine
  # containers on arm64 runners (no musl Node to inject). See ci.yml.
  linux-musl:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build in Alpine container (musl)
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo node:24-alpine \
            sh -c "apk add --no-cache build-base && node tools/build.mjs --all"
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.arch }}-musl
          path: build/*.node

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node tools/build.mjs --all
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-windows-x64
          path: build/*.node

  publish:
    needs: [darwin, linux-gnu, linux-musl, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: build/

      # Derive the release version from the tag (v1.2.3 -> 1.2.3) and assemble.
      # --check fails the release if any published platform got zero binaries.
      - name: Assemble packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Releasing version $VERSION"
          node tools/prepare-release.mjs "$VERSION" --check

      # Publish every per-platform package first, then the meta package LAST so
      # its exact-pinned optionalDependencies already resolve on the registry.
      #
      # NOTE the leading `./` on every publish path: `npm publish packages/foo`
      # is parsed as a GitHub shorthand (owner/repo), NOT a local directory, and
      # fails trying to SSH-clone it. `./packages/foo` forces the folder reading.
      #
      # Each publish is idempotent — it skips a version already on the registry —
      # so if a later step fails mid-release, re-running completes it cleanly
      # instead of erroring on "cannot publish over previously published version".
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in packages/engine-*/; do
            if ! ls "$dir"/*.node >/dev/null 2>&1; then
              echo "skipping $dir (no binaries)"
              continue
            fi
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if npm view "$name@$ver" version >/dev/null 2>&1; then
              echo "skip $name@$ver (already on registry)"
            else
              echo "publishing $name@$ver"
              npm publish "./$dir" --provenance --access public
            fi
          done

      - name: Publish meta package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ver=$(node -p "require('./packages/engine/package.json').version")
          if npm view "@morojs/engine@$ver" version >/dev/null 2>&1; then
            echo "@morojs/engine@$ver already published"
          else
            npm publish ./packages/engine --provenance --access public
          fi
